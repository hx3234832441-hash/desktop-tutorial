<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>登录 - Shein Estilo VIP</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="login-box">

<h1>Shein Estilo VIP</h1>

<p id="loginTitle">会员管理系统</p>

<input
id="username"
type="text"
placeholder="用户名">

<input
id="password"
type="password"
placeholder="密码">

<select id="role">

<option value="boss">老板</option>

<option value="staff">店员</option>

</select>

<button id="loginBtn">

登录

</button>

<div style="margin-top:20px">

<button id="langBtn">

中文 / Español

</button>

</div>

</div>

<script src="js/language.js"></script>

<script src="js/login.js"></script>

</body>

</html>
